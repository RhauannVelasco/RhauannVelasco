name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Generate snake svg
        uses: Platane/snk@v3
        with:
          github_user_name: RhauannVelasco
          outputs: |
             dist/github-contribution-grid-snake.svg?color_snake=%2347D7FF&color_dots=%232b3440,%23003366,%230066cc,%2300aaff,%2300ffff

      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
